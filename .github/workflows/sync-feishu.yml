name: Sync Feishu Data

on:
  schedule:
    # 04:00 Asia/Shanghai = 20:00 UTC (previous day)
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Sync product data from Feishu Bitable
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_SPREADSHEET_TOKEN: ${{ secrets.FEISHU_SPREADSHEET_TOKEN }}
          FEISHU_SHEET_RANGE: ${{ secrets.FEISHU_SHEET_RANGE }}
        run: |
          python3 scripts/generate-products-data-table.py --source feishu

      - name: Build site
        run: npm ci && npm run build

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/assets/product-data-table.js dist
          git commit -m "chore: sync Feishu product data"
          git push
