<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>i18n Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    button { margin: 5px; padding: 10px 15px; cursor: pointer; }
    #output { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>多语言测试</h1>

  <div>
    <button onclick="testLoadI18n()">测试加载 i18n.json</button>
    <button onclick="testSwitchLanguage('en')">切换到 English</button>
    <button onclick="testSwitchLanguage('zh-CN')">切换到 简体中文</button>
    <button onclick="testSwitchLanguage('de')">切换到 Deutsch</button>
  </div>

  <div id="output"></div>

  <script>
    function log(message, type = 'info') {
      const output = document.getElementById('output');
      const div = document.createElement('div');
      div.className = type;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      output.insertBefore(div, output.firstChild);
      console.log(`[${type}]`, message);
    }

    async function testLoadI18n() {
      log('开始加载 i18n.json...');
      try {
        const response = await fetch('./assets/i18n.json?ts=' + Date.now());
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        const data = await response.json();
        const languages = Object.keys(data);
        log(`✅ 成功加载 i18n.json`, 'success');
        log(`📊 包含 ${languages.length} 种语言: ${languages.join(', ')}`, 'success');

        // 检查每种语言的键数量
        languages.forEach(lang => {
          const keys = Object.keys(data[lang]);
          log(`   ${lang}: ${keys.length} 个翻译键`, 'success');
        });

        // 测试获取一些翻译
        log('\n测试翻译内容:');
        const testKeys = ['company_name', 'nav_contact', 'nav_produkte'];
        testKeys.forEach(key => {
          const en = data['en']?.[key];
          const zh = data['zh-CN']?.[key];
          log(`   ${key}:`, 'info');
          if (en) log(`      en: ${en}`, 'success');
          if (zh) log(`      zh-CN: ${zh}`, 'success');
        });

        window.i18nData = data;
      } catch (error) {
        log(`❌ 加载失败: ${error.message}`, 'error');
        console.error(error);
      }
    }

    function testSwitchLanguage(lang) {
      log(`\n测试切换语言到: ${lang}`);
      if (!window.i18nData) {
        log('❌ 请先加载 i18n.json', 'error');
        return;
      }

      const translations = window.i18nData[lang];
      if (!translations) {
        log(`❌ 语言 ${lang} 不存在`, 'error');
        return;
      }

      log(`✅ 成功切换到 ${lang}`, 'success');

      // 显示一些示例翻译
      const examples = ['company_name', 'nav_contact', 'nav_produkte', 'nav_vorteile', 'nav_vertrauen'];
      log('示例翻译:');
      examples.forEach(key => {
        const translation = translations[key];
        if (translation) {
          log(`   ${key}: ${translation}`, 'success');
        } else {
          log(`   ${key}: (未翻译)`, 'error');
        }
      });
    }

    // 页面加载时自动测试
    window.addEventListener('DOMContentLoaded', () => {
      log('页面已加载，等待测试...');
      setTimeout(testLoadI18n, 500);
    });
  </script>
</body>
</html>
