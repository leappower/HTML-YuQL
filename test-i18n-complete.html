<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多语言系统完整测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { color: #333; }
    .test-section {
      margin: 20px 0;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 5px;
    }
    .success { color: green; }
    .error { color: red; }
    .warning { color: orange; }
    #console-output {
      background: #1a1a1a;
      color: #0f0;
      padding: 15px;
      border-radius: 5px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 500px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .btn-group { margin: 10px 0; }
    button {
      margin: 5px;
      padding: 10px 15px;
      cursor: pointer;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 3px;
    }
    button:hover { background: #0056b3; }
    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 12px;
      margin-left: 10px;
    }
    .status-ok { background: #d4edda; color: #155724; }
    .status-fail { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h1>多语言系统完整测试 <span id="system-status" class="status-badge status-fail">未测试</span></h1>

  <div class="test-section">
    <h2>手动测试</h2>
    <div class="btn-group">
      <button onclick="loadTestScript()">加载测试脚本</button>
      <button onclick="testLoadI18n()">测试加载 i18n.json</button>
      <button onclick="testSwitchLanguage('en')">English</button>
      <button onclick="testSwitchLanguage('zh-CN')">简体中文</button>
      <button onclick="testSwitchLanguage('de')">Deutsch</button>
      <button onclick="testSwitchLanguage('ja')">日本語</button>
      <button onclick="clearOutput()">清空输出</button>
    </div>
  </div>

  <div class="test-section">
    <h2>控制台输出</h2>
    <div id="console-output">等待测试...</div>
  </div>

  <div class="test-section">
    <h2>当前状态</h2>
    <div id="current-state">
      <p>当前语言: <span id="current-lang">-</span></p>
      <p>已加载语言: <span id="loaded-langs">-</span></p>
      <p>系统初始化: <span id="system-init">-</span></p>
    </div>
  </div>

  <script>
    const output = document.getElementById('console-output');

    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const prefix = {
        'info': '[INFO]',
        'success': '[✅]',
        'error': '[❌]',
        'warning': '[⚠️]'
      }[type] || '[INFO]';

      output.textContent += `${timestamp} ${prefix} ${message}\n`;
      output.scrollTop = output.scrollHeight;
      console.log(`${prefix}`, message);
    }

    function clearOutput() {
      output.textContent = '已清空\n';
    }

    function updateStatus(ok) {
      const status = document.getElementById('system-status');
      if (ok) {
        status.className = 'status-badge status-ok';
        status.textContent = '正常';
      } else {
        status.className = 'status-badge status-fail';
        status.textContent = '异常';
      }
    }

    function updateCurrentState() {
      if (window.translationManager) {
        document.getElementById('current-lang').textContent =
          window.translationManager.currentLanguage || '-';

        const cachedLangs = Array.from(window.translationManager.translationsCache.keys());
        document.getElementById('loaded-langs').textContent =
          cachedLangs.length > 0 ? cachedLangs.join(', ') : '无';

        document.getElementById('system-init').textContent =
          window.translationManager.isInitialized ? '是' : '否';
      }
    }

    async function testLoadI18n() {
      log('开始测试加载 i18n.json...');

      try {
        const startTime = performance.now();
        const response = await fetch('./assets/i18n.json?ts=' + Date.now());
        const endTime = performance.now();

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        const languages = Object.keys(data);

        log(`✅ 成功加载 i18n.json (${(endTime - startTime).toFixed(2)}ms)`, 'success');
        log(`📊 包含 ${languages.length} 种语言: ${languages.join(', ')}`);

        languages.forEach(lang => {
          const keys = Object.keys(data[lang]);
          log(`   ${lang}: ${keys.length} 个翻译键`, 'success');
        });

        window.i18nData = data;
        updateStatus(true);

        // 更新当前状态
        log('\n测试翻译内容:', 'info');
        const testKeys = ['company_name', 'nav_contact', 'nav_produkte', 'nav_vorteile'];
        testKeys.forEach(key => {
          const translations = {};
          ['en', 'zh-CN', 'de'].forEach(lang => {
            const t = data[lang]?.[key];
            if (t) translations[lang] = t;
          });
          log(`   ${key}:`, 'info');
          Object.entries(translations).forEach(([lang, text]) => {
            log(`      ${lang}: ${text}`, 'success');
          });
        });

      } catch (error) {
        log(`❌ 加载失败: ${error.message}`, 'error');
        console.error(error);
        updateStatus(false);
      }
    }

    function testSwitchLanguage(lang) {
      log(`\n测试切换语言到: ${lang}`);

      if (!window.setLanguage) {
        log('❌ setLanguage 函数未定义', 'error');
        updateStatus(false);
        return;
      }

      window.setLanguage(lang)
        .then(() => {
          log(`✅ 成功切换到 ${lang}`, 'success');
          updateCurrentState();

          // 显示一些示例翻译
          const examples = ['company_name', 'nav_contact', 'nav_produkte'];
          log('当前语言翻译示例:', 'info');
          examples.forEach(key => {
            const translation = window.t ? window.t(key) : 't函数未定义';
            log(`   ${key}: ${translation}`, 'success');
          });
        })
        .catch(error => {
          log(`❌ 切换失败: ${error.message}`, 'error');
          updateStatus(false);
        });
    }

    function loadTestScript() {
      log('加载测试脚本...');
      const script = document.createElement('script');
      script.src = './test-i18n-detailed.js';
      script.onload = () => log('✅ 测试脚本已加载', 'success');
      script.onerror = () => log('❌ 测试脚本加载失败', 'error');
      document.head.appendChild(script);
    }

    // 定期更新状态
    setInterval(updateCurrentState, 1000);

    // 页面加载时自动测试
    window.addEventListener('DOMContentLoaded', () => {
      log('页面已加载', 'info');
      log('点击"加载测试脚本"开始详细测试', 'info');
      log('或点击"测试加载 i18n.json"手动测试', 'info');

      // 等待翻译系统初始化
      setTimeout(() => {
        updateCurrentState();
      }, 2000);
    });
  </script>
</body>
</html>
